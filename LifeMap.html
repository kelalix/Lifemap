<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MY Life Map </title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    padding:30px;
    transition: background 0.5s;
}

.container{
    width:1100px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:10px;
}

h1{
    text-align:center;
}

.subtitle{
    text-align:center;
    margin-bottom:20px;
    color:#cbd5f5;
}

.stats{
    text-align:center;
    margin-bottom:20px;
    color:#e2e8f0;
}

.row{
    display:flex;
    align-items:center;
    margin:5px 0;
    padding:4px;
    border-radius:5px;
}

.year{
    width:40px;
    font-weight:bold;
}

.weeks{
    display:flex;
    flex-wrap:wrap;
}

.week{
    width:12px;
    height:12px;
    border:1px solid rgba(255,255,255,0.3);
    margin:1px;
    border-radius:2px;
    cursor:pointer;
}

.week:hover{
    transform:scale(1.2);
}

.checked{
    background:#22c55e;
}

/* Age group background */
.age1{ background:rgba(59,130,246,0.15); }
.age2{ background:rgba(34,197,94,0.15); }
.age3{ background:rgba(250,204,21,0.15); }
.age4{ background:rgba(249,115,22,0.15); }
.age5{ background:rgba(239,68,68,0.15); }

.legend{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}

.legend div{
    padding:4px 8px;
    border-radius:4px;
    font-size:12px;
}

.l1{background:rgba(59,130,246,0.3);}
.l2{background:rgba(34,197,94,0.3);}
.l3{background:rgba(250,204,21,0.3);}
.l4{background:rgba(249,115,22,0.3);}
.l5{background:rgba(239,68,68,0.3);}

</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>MY Life Map</h1>
<p class="subtitle">100 Years • 5200 Weeks</p>

<div class="stats">
<p>Average Human Life Expectancy: <b>73 Years</b></p>
<p>Average Life in Weeks: <b id="lifeWeeks"></b></p>
<p>Checked Weeks: <b id="checkedCount">0</b></p>
</div>

<div class="legend">
<div class="l1">0-20</div>
<div class="l2">21-40</div>
<div class="l3">41-60</div>
<div class="l4">61-80</div>
<div class="l5">81-100</div>
</div>

<div id="container"></div>

</div>
</div>

<script>

const container = document.getElementById("container");
const lifeWeeksDisplay = document.getElementById("lifeWeeks");
const checkedCountDisplay = document.getElementById("checkedCount");

const averageLifeYears = 73;
const weeks = averageLifeYears * 52;
lifeWeeksDisplay.textContent = weeks + " weeks";

let savedWeeks = JSON.parse(localStorage.getItem("weeks")) || {};

function updateBackground() {
    const totalChecked = Object.keys(savedWeeks).length;
    checkedCountDisplay.textContent = totalChecked;
    // Darken background proportional to checked weeks
    const darkness = Math.min(0.8, totalChecked / 5200);
    document.body.style.background = `rgba(15,23,42,${1 - darkness})`;
}

for(let year=1; year<=100; year++){

    const row=document.createElement("div");
    row.className="row";

    if(year<=20) row.classList.add("age1");
    else if(year<=40) row.classList.add("age2");
    else if(year<=60) row.classList.add("age3");
    else if(year<=80) row.classList.add("age4");
    else row.classList.add("age5");

    const yearLabel=document.createElement("div");
    yearLabel.className="year";
    yearLabel.textContent=year;

    const weeksDiv=document.createElement("div");
    weeksDiv.className="weeks";

    for(let week=1; week<=52; week++){
        const box=document.createElement("div");
        box.className="week";

        const key=year+"-"+week;

        if(savedWeeks[key]){
            box.classList.add("checked");
        }

        box.onclick=()=>{
            box.classList.toggle("checked");

            if(box.classList.contains("checked")){
                savedWeeks[key]=true;
            }else{
                delete savedWeeks[key];
            }

            localStorage.setItem("weeks",JSON.stringify(savedWeeks));
            updateBackground();
        };

        weeksDiv.appendChild(box);
    }

    row.appendChild(yearLabel);
    row.appendChild(weeksDiv);
    container.appendChild(row);
}

// initialize background and checked count
updateBackground();

</script>

</body>
</html>
